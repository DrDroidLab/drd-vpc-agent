{{- if .Values.autoUpdate.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: agent-restart
spec:
  schedule: "{{ .Values.autoUpdate.schedule }}"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: drd-vpc-agent-restart
          {{- with (concat (default (list) .Values.global.imagePullSecrets) (default (list) .Values.autoUpdate.imagePullSecrets)) }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.autoUpdate.podSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.global.nodeSelector }}
          nodeSelector:
            {{- toYaml .Values.global.nodeSelector | nindent 12 }}
          {{- end }}
          {{- if .Values.global.tolerations }}
          tolerations:
            {{- toYaml .Values.global.tolerations | nindent 12 }}
          {{- end }}
          containers:
            - name: kubectl
              image: "{{ .Values.autoUpdate.image.repository }}:{{ .Values.autoUpdate.image.tag }}"
              imagePullPolicy: {{ .Values.autoUpdate.image.pullPolicy }}
              {{- with .Values.autoUpdate.securityContext }}
              securityContext:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              command:
                - /bin/sh
                - -c
                - |
                  echo "Restarting celery components..."
                  kubectl rollout restart deployment drd-vpc-agent-celery-beat -n {{ .Release.Namespace }}
                  kubectl rollout restart deployment drd-vpc-agent-celery-worker -n {{ .Release.Namespace }}
          restartPolicy: OnFailure
{{- end }}

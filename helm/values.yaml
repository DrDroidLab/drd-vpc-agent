global:
  DRD_CLOUD_API_TOKEN: ""
  DRD_CLOUD_API_HOST: "https://agent-api.drdroid.io"
  NATIVE_KUBERNETES_API_MODE: "true"

  # Global node scheduling configuration
  # Applied to all services (redis, celery-beat, celery-worker)
  # Example nodeSelector:
  # nodeSelector:
  #   "worker-type": "aux-pool"
  #   "kubernetes.io/os": "linux"
  nodeSelector: {}
  # Example tolerations:
  # tolerations:
  #   - key: "dedicated"
  #     operator: "Equal"
  #     value: "infra"
  #     effect: "NoSchedule"
  tolerations: []

  # Global image pull secrets applied to every pod (celery-beat, celery-worker,
  # redis, init containers, restart cronjob). Per-component imagePullSecrets are
  # merged on top of this list.
  # Example:
  # imagePullSecrets:
  #   - name: jfrog-pull-secret
  imagePullSecrets: []

# Network Mapper Configuration
# Controls whether the network mapper components are deployed
# The network mapper provides service topology visibility and network insights
# Default: enabled (recommended for full functionality)
networkMapper:
  enabled: true

# Auto Update Configuration
# Controls whether automatic deployment updates (restart cronjob) are enabled
# When enabled, deployments are automatically restarted on schedule to pick up new images
# Default: enabled (automatic updates for latest images)
autoUpdate:
  enabled: true
  schedule: "0 0 * * *"  # every day at 00:00 UTC
  image:
    repository: ghcr.io/drdroidlab/drd-vpc-agent/kubectl
    tag: latest
    pullPolicy: Always
  # Image pull secrets for the kubectl image used by the restart CronJob.
  # These are merged with global.imagePullSecrets.
  # Example:
  # imagePullSecrets:
  #   - name: ghcr-pull-secret
  imagePullSecrets: []
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      drop:
        - ALL

celery-beat:
  image:
    repository: ghcr.io/drdroidlab/drd-vpc-agent/drd-vpc-agent
    tag: latest
    pullPolicy: Always
  # Image pull secrets for the celery-beat pod (merged with global.imagePullSecrets).
  # Example:
  # imagePullSecrets:
  #   - name: jfrog-pull-secret
  imagePullSecrets: []
  # Init container that waits for redis. Image is fully configurable.
  initContainer:
    image:
      repository: busybox
      tag: "1.36"
      pullPolicy: IfNotPresent
  # Pod-level security context (applies to all containers in the pod).
  # UID/GID 33 = www-data (the user the drd-vpc-agent image chowns /code to).
  # Defaults satisfy PSP/Gatekeeper "runAsNonRoot or runAsUser != 0" policies.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 33
    runAsGroup: 33
    fsGroup: 33
  # Container-level security context (applied to celery-beat container and
  # init container). Override runAsUser to match the UID baked into your image.
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 33
    capabilities:
      drop:
        - ALL

celery-worker:
  image:
    repository: ghcr.io/drdroidlab/drd-vpc-agent/drd-vpc-agent
    tag: latest
    pullPolicy: Always
  # Image pull secrets for the celery-worker pod (merged with global.imagePullSecrets).
  # Applies to all worker containers (scheduler, task-executor, asset-extractor).
  # Example:
  # imagePullSecrets:
  #   - name: jfrog-pull-secret
  imagePullSecrets: []
  initContainer:
    image:
      repository: busybox
      tag: "1.36"
      pullPolicy: IfNotPresent
  # UID/GID 33 = www-data (the user the drd-vpc-agent image chowns /code to).
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 33
    runAsGroup: 33
    fsGroup: 33
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 33
    capabilities:
      drop:
        - ALL
  # Resource configuration for celery worker containers
  resources:
    scheduler:
      # Lightweight task scheduler - handles polling tasks (reduced from 4 to 2 workers)
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "1000Mi"
    taskExecutor:
      # Task executor for high-priority tasks - handles execution of critical tasks (reduced from 4 to 3 workers)
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1536Mi"
    assetExtractor:
      # Asset extraction worker - handles long-running asset discovery (reduced from 3 to 1 worker)
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1536Mi"

redis:
  image:
    repository: redis
    tag: 8-alpine
    pullPolicy: IfNotPresent
  # Image pull secrets for the redis pod (merged with global.imagePullSecrets).
  # Example:
  # imagePullSecrets:
  #   - name: dockerhub-pull-secret
  imagePullSecrets: []
  # redis:8-alpine ships a `redis` user with UID/GID 999.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 999
    runAsGroup: 999
    fsGroup: 999
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 999
    capabilities:
      drop:
        - ALL

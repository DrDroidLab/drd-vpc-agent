name: "Build and push kubectl image"

on:
  push:
    paths:
      - Dockerfile_kubectl
      - .github/workflows/build-and-push-kubectl.yaml
    branches:
      - "main"
  workflow_dispatch:

permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_TEAM_NAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push kubectl image
        env:
          DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_TEAM_NAME }}/kubectl
          GHCR_REPO: ghcr.io/drdroidlab/drd-vpc-agent/kubectl
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag ${DOCKERHUB_REPO}:latest \
            --tag ${GHCR_REPO}:latest \
            --file Dockerfile_kubectl \
            --push \
            .
